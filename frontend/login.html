    <title>StudyMate AI — Login</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f2e 50%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .orb { position:fixed; border-radius:50%; filter:blur(80px); animation:orbFloat 8s ease-in-out infinite; z-index:0; }
        .orb-1 { width:350px; height:350px; background:rgba(30,80,180,0.2); top:-80px; left:-80px; }
        .orb-2 { width:250px; height:250px; background:rgba(100,180,255,0.12); bottom:-60px; right:-60px; animation-delay:-4s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0);} 50%{transform:translate(20px,-20px);} }
        .particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .particle { position:absolute; background:#64b4ff; border-radius:50%; animation:floatUp linear infinite; opacity:0; }
        @keyframes floatUp {
            0%{transform:translateY(100vh) scale(0);opacity:0;}
            10%{opacity:0.5;} 90%{opacity:0.2;}
            100%{transform:translateY(-10vh) scale(1.5);opacity:0;}
        }
        .main-layout {
            position:relative; z-index:10;
            display:flex; align-items:center; gap:40px; padding:20px;
        }
        .girl-wrapper {
            display:flex; flex-direction:column; align-items:center; gap:14px;
        }
        .speech-bubble {
            background:rgba(30,80,180,0.25);
            border:1px solid rgba(100,180,255,0.5);
            border-radius:16px 16px 16px 4px;
            padding:10px 16px; font-size:0.85rem;
            color:#64b4ff; max-width:220px; text-align:center;
            animation:bubblePop 0.4s cubic-bezier(0.34,1.56,0.64,1);
            min-height: 42px;
        }
        @keyframes bubblePop { from{transform:scale(0.5);opacity:0;} to{transform:scale(1);opacity:1;} }
    </style>
</head>

        </div>

        </div>

            <button class="guest-btn" onclick="handleGuest()" onmouseover="sayMessage('hover-guest')">👤 Guest ke taur pe continue karo</button>

<style>

@keyframes fp1 { 0%,100%{transform:translate(0,0);opacity:0.6;} 50%{transform:translate(5px,-15px);opacity:0.2;} }
@keyframes fp2 { 0%,100%{transform:translate(0,0);opacity:0.5;} 50%{transform:translate(-8px,-20px);opacity:0.1;} }
@keyframes fp3 { 0%,100%{transform:translate(0,0);opacity:0.4;} 50%{transform:translate(6px,-18px);opacity:0.1;} }

.music-float-1 { animation: mf1 2s ease-in-out infinite; }
.music-float-2 { animation: mf2 2.7s ease-in-out infinite; }
.music-float-3 { animation: mf3 3.2s ease-in-out infinite; }
@keyframes mf1 { 0%{transform:translateY(0);opacity:0;} 30%{opacity:1;} 100%{transform:translateY(-40px);opacity:0;} }
@keyframes mf2 { 0%{transform:translateY(0);opacity:0;} 30%{opacity:1;} 100%{transform:translateY(-35px);opacity:0;} }
@keyframes mf3 { 0%{transform:translateY(0);opacity:0;} 30%{opacity:1;} 100%{transform:translateY(-30px);opacity:0;} }
</style>

<script>
const messages = {
    "idle": [
        "Arre! Pehle login karo 😊",
        "Padhai time hai! 📚",
        "Main yahaan hoon, chinta mat karo 💕",
        "Aaj kya padhna hai? 🤔",
        "Login karo, phir seekhte hain! 💙",
        "StudyMate ready hai tere liye! ✨",
        "Jaldi karo, bahut kuch seekhna hai! 🚀",
        "Blue hair, big dreams! 💙✨",
    ],
    "focus-email": "Email daal do, main wait kar rahi hoon 😄",
    "focus-pass": "Password secret rahega, I promise! 🤫",
    "focus-name": "Naam batao apna! Main yaad rakhungi 💕",
    "hover-login": "Haan haan! Login karo jaldi! 🎉",
    "hover-signup": "New account? Swagat hai! 🥳",
    "hover-guest": "Guest bhi chalega, koi nahi! 😊",
};
let idleIndex=0, idleTimer;

function sayMessage(key){
    clearTimeout(idleTimer);
    const bubble=document.getElementById("speechBubble");
    const msg=typeof messages[key]==="string"?messages[key]:messages["idle"][0];
    bubble.style.animation="none"; bubble.offsetHeight;
    bubble.style.animation="bubblePop 0.4s cubic-bezier(0.34,1.56,0.64,1)";
    bubble.textContent=msg;
    startIdleTimer();
}
function startIdleTimer(){
    clearTimeout(idleTimer);
    idleTimer=setTimeout(()=>{
        const bubble=document.getElementById("speechBubble");
        const msg=messages["idle"][idleIndex%messages["idle"].length];
        bubble.style.animation="none"; bubble.offsetHeight;
        bubble.style.animation="bubblePop 0.4s cubic-bezier(0.34,1.56,0.64,1)";
        bubble.textContent=msg; idleIndex++;
        startIdleTimer();
    },3000);
}
startIdleTimer();

function switchTab(tab){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".form").forEach(f=>f.classList.remove("active"));
    if(tab==="login"){
        document.querySelectorAll(".tab")[0].classList.add("active");
        document.getElementById("loginForm").classList.add("active");
        sayMessage("idle");
    }else{
        document.querySelectorAll(".tab")[1].classList.add("active");
        document.getElementById("signupForm").classList.add("active");
        sayMessage("focus-name");
    }
}
function showSuccessAndRedirect(name){
    document.getElementById("successText").textContent=`Welcome, ${name}! 🎓`;
    document.getElementById("successOverlay").classList.add("show");
    setTimeout(()=>{window.location.href="index.html";},1800);
}
function handleLogin(){
    const email=document.getElementById("loginEmail").value.trim();
    const pass=document.getElementById("loginPass").value.trim();
    if(!email||!pass){alert("Email aur password dono bharo 🙏");return;}
    localStorage.setItem("studymate_user",email.split("@")[0]);
    showSuccessAndRedirect(email.split("@")[0]);
}
function handleSignup(){
    const name=document.getElementById("signupName").value.trim();
    const email=document.getElementById("signupEmail").value.trim();
    const pass=document.getElementById("signupPass").value.trim();
    if(!name||!email||!pass){alert("Saari fields bharo 🙏");return;}
    localStorage.setItem("studymate_user",name);
    showSuccessAndRedirect(name);
}
function handleGuest(){
    localStorage.setItem("studymate_user","Guest");
    showSuccessAndRedirect("Guest");
}
document.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
        const af=document.querySelector(".form.active").id;
        if(af==="loginForm")handleLogin(); else handleSignup();
    }
});
</script>
</body>
</html>
