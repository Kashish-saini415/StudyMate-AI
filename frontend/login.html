<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>StudyMate AI — Login</title>
    <!-- Live2D Cubism SDK -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f2e 50%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .orb { position:fixed; border-radius:50%; filter:blur(80px); animation:orbFloat 8s ease-in-out infinite; z-index:0; }
        .orb-1 { width:350px; height:350px; background:rgba(30,80,180,0.2); top:-80px; left:-80px; }
        .orb-2 { width:250px; height:250px; background:rgba(100,180,255,0.12); bottom:-60px; right:-60px; animation-delay:-4s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0);} 50%{transform:translate(20px,-20px);} }
        .particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .particle { position:absolute; background:#64b4ff; border-radius:50%; animation:floatUp linear infinite; opacity:0; }
        @keyframes floatUp {
            0%{transform:translateY(100vh) scale(0);opacity:0;}
            10%{opacity:0.5;} 90%{opacity:0.2;}
            100%{transform:translateY(-10vh);opacity:0;}
        }
        .main-layout {
            position:relative; z-index:10;
            display:flex; align-items:center; gap:30px; padding:20px;
        }
        .girl-wrapper {
            display:flex; flex-direction:column; align-items:center; gap:10px;
        }
        .speech-bubble {
            background:rgba(30,80,180,0.25);
            border:1px solid rgba(100,180,255,0.5);
            border-radius:16px 16px 16px 4px;
            padding:10px 16px; font-size:0.85rem;
            color:#64b4ff; max-width:230px; text-align:center;
            animation:bubblePop 0.4s cubic-bezier(0.34,1.56,0.64,1);
            min-height: 42px; z-index: 20; position:relative;
        }
        @keyframes bubblePop { from{transform:scale(0.5);opacity:0;} to{transform:scale(1);opacity:1;} }
        #live2d-canvas {
            width: 280px;
            height: 420px;
            border-radius: 16px;
        }
        /* LOGIN CARD */
        .login-card {
            background:rgba(10,10,30,0.92); backdrop-filter:blur(20px);
            border:1px solid rgba(100,180,255,0.2); border-radius:24px;
            padding:38px 34px; width:370px; max-width:95vw;
            box-shadow:0 25px 60px rgba(0,0,0,0.6);
            animation:cardAppear 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        @keyframes cardAppear { from{opacity:0;transform:translateY(40px) scale(0.9);} to{opacity:1;transform:translateY(0) scale(1);} }
        .logo-area{text-align:center;margin-bottom:22px;}
        .logo-icon{font-size:2.5rem;display:block;animation:bounce 2s ease-in-out infinite;}
        @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
        .logo-title{font-size:1.5rem;font-weight:700;color:#64b4ff;margin-top:8px;}
        .logo-subtitle{font-size:0.78rem;color:#555;margin-top:4px;}
        .tabs{display:flex;background:#050510;border-radius:10px;padding:4px;margin-bottom:22px;}
        .tab{flex:1;padding:9px;text-align:center;font-size:0.84rem;color:#555;cursor:pointer;border-radius:8px;transition:all 0.3s;}
        .tab.active{background:linear-gradient(135deg,#1e50b4,#64b4ff);color:white;font-weight:600;}
        .form{display:none;} .form.active{display:block;animation:fadeInForm 0.3s ease;}
        @keyframes fadeInForm{from{opacity:0;transform:translateX(10px);}to{opacity:1;transform:translateX(0);}}
        .input-group{margin-bottom:15px;}
        .input-group label{display:block;font-size:0.76rem;color:#666;margin-bottom:6px;letter-spacing:0.5px;}
        .input-group input{width:100%;padding:11px 14px;background:#050510;border:1px solid #1a1a3a;border-radius:10px;color:#e0e0e0;font-size:0.87rem;outline:none;transition:all 0.3s;}
        .input-group input:focus{border-color:#1e50b4;box-shadow:0 0 0 3px rgba(30,80,180,0.2);}
        .input-group input::placeholder{color:#333;}
        .submit-btn{width:100%;padding:12px;background:linear-gradient(135deg,#1e50b4,#64b4ff);border:none;border-radius:12px;color:white;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.3s;margin-top:6px;}
        .submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(30,80,180,0.5);}
        .divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:#333;font-size:0.76rem;}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:#1a1a3a;}
        .guest-btn{width:100%;padding:11px;background:transparent;border:1px solid #1a1a3a;border-radius:12px;color:#666;font-size:0.87rem;cursor:pointer;transition:all 0.3s;}
        .guest-btn:hover{background:#0a0a20;border-color:#64b4ff;color:#64b4ff;}
        .success-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#050510;z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
        .success-overlay.show{display:flex;animation:fadeInFull 0.3s ease;}
        @keyframes fadeInFull{from{opacity:0;}to{opacity:1;}}
        .success-icon{font-size:4rem;animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);}
        @keyframes popIn{from{transform:scale(0);}to{transform:scale(1);}}
        .success-text{color:#64b4ff;font-size:1.3rem;font-weight:600;}
        .success-sub{color:#555;font-size:0.82rem;}
        @media(max-width:750px){.main-layout{flex-direction:column;gap:16px;} #live2d-canvas{width:200px;height:300px;}}
    </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="particles" id="particles"></div>

<div class="main-layout">
    <!-- Character side -->
    <div class="girl-wrapper">
        <div class="speech-bubble" id="speechBubble">Arre! Pehle login karo 😊</div>
        <canvas id="live2d-canvas"></canvas>
    </div>

    <!-- Login Card -->
    <div class="login-card">
        <div class="logo-area">
            <span class="logo-icon">🎓</span>
            <div class="logo-title">StudyMate AI</div>
            <div class="logo-subtitle">Your personal AI study partner ✨</div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('signup')">Sign Up</div>
        </div>
        <div class="form active" id="loginForm">
            <div class="input-group">
                <label>EMAIL</label>
                <input type="email" placeholder="tumhara@email.com" id="loginEmail" onfocus="sayMessage('focus-email')" />
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" placeholder="••••••••" id="loginPass" onfocus="sayMessage('focus-pass')" />
            </div>
            <button class="submit-btn" onclick="handleLogin()" onmouseover="sayMessage('hover-login')">🚀 Login & Study Karo!</button>
            <div class="divider">ya phir</div>
            <button class="guest-btn" onclick="handleGuest()" onmouseover="sayMessage('hover-guest')">👤 Guest ke taur pe continue karo</button>
        </div>
        <div class="form" id="signupForm">
            <div class="input-group">
                <label>YOUR NAME</label>
                <input type="text" placeholder="Apna naam likho" id="signupName" onfocus="sayMessage('focus-name')" />
            </div>
            <div class="input-group">
                <label>EMAIL</label>
                <input type="email" placeholder="tumhara@email.com" id="signupEmail" onfocus="sayMessage('focus-email')" />
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" placeholder="••••••••" id="signupPass" onfocus="sayMessage('focus-pass')" />
            </div>
            <button class="submit-btn" onclick="handleSignup()" onmouseover="sayMessage('hover-signup')">🎉 Account Banao!</button>
            <div class="divider">ya phir</div>
            <button class="guest-btn" onclick="handleGuest()">👤 Guest ke taur pe continue karo</button>
        </div>
    </div>
</div>

<div class="success-overlay" id="successOverlay">
    <div class="success-icon">🎓</div>
    <div class="success-text" id="successText">Welcome!</div>
    <div class="success-sub">Padhai shuru karte hain... 📚</div>
</div>

<script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
<script>
// Particles
const container = document.getElementById("particles");
for(let i=0;i<35;i++){
    const p=document.createElement("div");
    p.classList.add("particle");
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(Math.random()*10+8)+"s";
    p.style.animationDelay=(Math.random()*10)+"s";
    p.style.width=p.style.height=(Math.random()*4+2)+"px";
    container.appendChild(p);
}

// Load Live2D model
function loadLive2D() {
    const canvas = document.getElementById("live2d-canvas");
    canvas.width = 280;
    canvas.height = 420;
    try {
        loadlive2d("live2d-canvas", "character/runtime/mao_pro.model3.json");
    } catch(e) {
        console.log("Live2D load error:", e);
        // Fallback to static image
        canvas.style.display = "none";
        const img = document.createElement("div");
        img.style.cssText = "width:280px;height:420px;display:flex;align-items:center;justify-content:center;font-size:8rem;animation:girlFloat 3s ease-in-out infinite;";
        img.textContent = "🎓";
        canvas.parentNode.insertBefore(img, canvas);
    }
}

window.addEventListener("load", () => {
    setTimeout(loadLive2D, 500);
});

// Speech messages
const messages = {
    "idle": [
        "Arre! Pehle login karo 😊",
        "Padhai time hai! 📚",
        "Main yahaan hoon, chinta mat karo 💕",
        "Aaj kya padhna hai? 🤔",
        "Login karo, phir seekhte hain! 💙",
        "StudyMate ready hai tere liye! ✨",
        "Jaldi karo, bahut kuch seekhna hai! 🚀",
    ],
    "focus-email": "Email daal do, main wait kar rahi hoon 😄",
    "focus-pass": "Password secret rahega, I promise! 🤫",
    "focus-name": "Naam batao apna! Main yaad rakhungi 💕",
    "hover-login": "Haan haan! Login karo jaldi! 🎉",
    "hover-signup": "New account? Swagat hai! 🥳",
    "hover-guest": "Guest bhi chalega, koi nahi! 😊",
};
let idleIndex=0, idleTimer;

function sayMessage(key){
    clearTimeout(idleTimer);
    const bubble=document.getElementById("speechBubble");
    const msg=typeof messages[key]==="string"?messages[key]:messages["idle"][0];
    bubble.style.animation="none"; bubble.offsetHeight;
    bubble.style.animation="bubblePop 0.4s cubic-bezier(0.34,1.56,0.64,1)";
    bubble.textContent=msg;
    startIdleTimer();
}
function startIdleTimer(){
    clearTimeout(idleTimer);
    idleTimer=setTimeout(()=>{
        const bubble=document.getElementById("speechBubble");
        bubble.style.animation="none"; bubble.offsetHeight;
        bubble.style.animation="bubblePop 0.4s cubic-bezier(0.34,1.56,0.64,1)";
        bubble.textContent=messages["idle"][idleIndex%messages["idle"].length];
        idleIndex++;
        startIdleTimer();
    },3000);
}
startIdleTimer();

function switchTab(tab){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".form").forEach(f=>f.classList.remove("active"));
    if(tab==="login"){
        document.querySelectorAll(".tab")[0].classList.add("active");
        document.getElementById("loginForm").classList.add("active");
    }else{
        document.querySelectorAll(".tab")[1].classList.add("active");
        document.getElementById("signupForm").classList.add("active");
        sayMessage("focus-name");
    }
}
function showSuccessAndRedirect(name){
    document.getElementById("successText").textContent=`Welcome, ${name}! 🎓`;
    document.getElementById("successOverlay").classList.add("show");
    setTimeout(()=>{window.location.href="index.html";},1800);
}
function handleLogin(){
    const email=document.getElementById("loginEmail").value.trim();
    const pass=document.getElementById("loginPass").value.trim();
    if(!email||!pass){alert("Email aur password dono bharo 🙏");return;}
    localStorage.setItem("studymate_user",email.split("@")[0]);
    showSuccessAndRedirect(email.split("@")[0]);
}
function handleSignup(){
    const name=document.getElementById("signupName").value.trim();
    const email=document.getElementById("signupEmail").value.trim();
    const pass=document.getElementById("signupPass").value.trim();
    if(!name||!email||!pass){alert("Saari fields bharo 🙏");return;}
    localStorage.setItem("studymate_user",name);
    showSuccessAndRedirect(name);
}
function handleGuest(){
    localStorage.setItem("studymate_user","Guest");
    showSuccessAndRedirect("Guest");
}
document.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
        const af=document.querySelector(".form.active").id;
        if(af==="loginForm")handleLogin(); else handleSignup();
    }
});
</script>
</body>
</html>
